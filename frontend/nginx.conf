# Serves the built SPA and proxies /api to the Go backend, mirroring the
# Vite dev proxy so the frontend keeps using relative paths in both modes.
server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets can be cached forever; index.html must not be.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /api/ {
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        # Resumes are up to 10 MB (backend maxUploadBytes) + multipart overhead.
        client_max_body_size 12m;
        # The tailor call holds a paid LLM request for up to ~90s.
        proxy_read_timeout 120s;
    }

    # SPA fallback: /app/*, /login etc. are client-side routes. index.html
    # must not be cached, or clients keep referencing old hashed bundles
    # after a deploy.
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
