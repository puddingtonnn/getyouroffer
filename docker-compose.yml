services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-getyouroffer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gyo-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://app:app@db:5432/getyouroffer?sslmode=disable
      - PORT=8090

volumes:
  pgdata:
