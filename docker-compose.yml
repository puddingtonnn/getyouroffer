services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-getyouroffer}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # $$ обязателен: одиночный $ compose интерполирует сам при парсинге.
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-app} -d $${POSTGRES_DB:-getyouroffer}"]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gyo-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://app:app@db:5432/getyouroffer?sslmode=disable
      - PORT=8090

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gyo-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"

volumes:
  pgdata:
