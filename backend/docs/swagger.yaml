basePath: /
definitions:
  github_com_puddingtonnn_getyouroffer_backend_internal_models.Gap:
    properties:
      requirement:
        type: string
      suggestion:
        type: string
    type: object
  github_com_puddingtonnn_getyouroffer_backend_internal_models.Match:
    properties:
      evidence:
        type: string
      requirement:
        type: string
    type: object
  github_com_puddingtonnn_getyouroffer_backend_internal_models.Profile:
    properties:
      created_at:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      updated_at:
        type: string
      user_id:
        type: string
    type: object
  github_com_puddingtonnn_getyouroffer_backend_internal_models.Result:
    properties:
      cover_letter:
        type: string
      gaps:
        items:
          $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Gap'
        type: array
      keywords_to_add:
        items:
          type: string
        type: array
      match_score:
        type: number
      matches:
        items:
          $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Match'
        type: array
      tailored_resume:
        type: string
    type: object
  internal_transport_http.authResponse:
    properties:
      token:
        type: string
    type: object
  internal_transport_http.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  internal_transport_http.registerRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
    type: object
host: localhost:8090
info:
  contact: {}
  description: API server for GetYourOffer service.
  title: GetYourOffer API
  version: "1.0"
paths:
  /api/tailor:
    post:
      consumes:
      - multipart/form-data
      description: Extracts text from a PDF resume, analyzes it against a vacancy
        text using LLM, and returns a tailored resume, cover letter, and match analysis.
      parameters:
      - description: Resume PDF file (max 10MB)
        in: formData
        name: resume
        required: true
        type: file
      - description: Vacancy text (max 50KB)
        in: formData
        name: vacancy
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Result'
      summary: Tailor resume to vacancy
      tags:
      - tailor
  /api/users/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT
      parameters:
      - description: Login info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.authResponse'
      summary: Login user
      tags:
      - users
  /api/users/me:
    get:
      description: Get profile of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Profile'
      security:
      - ApiKeyAuth: []
      summary: Get current profile
      tags:
      - users
  /api/users/register:
    post:
      consumes:
      - application/json
      description: Create a new user and profile
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_transport_http.authResponse'
      summary: Register a new user
      tags:
      - users
securityDefinitions:
  ApiKeyAuth:
    description: Type "Bearer <your-jwt-token>" to authenticate.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
