host: localhost:8090
info:
  contact: {}
  description: API server for GetYourOffer service.
  title: GetYourOffer API
  version: "1.0"
paths:
  /api/resumes:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Resume'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List all user resumes
      tags:
      - resumes
  /api/resumes/{id}:
    delete:
      parameters:
      - description: Resume ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - ApiKeyAuth: []
      summary: Delete a resume
      tags:
      - resumes
    get:
      parameters:
      - description: Resume ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.ResumeResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a resume
      tags:
      - resumes
  /api/tailor:
    post:
      consumes:
      - multipart/form-data
      description: Extracts text from a PDF resume, analyzes it against a vacancy
        text using LLM, and returns a tailored resume, cover letter, and match analysis.
      parameters:
      - description: Resume PDF file (max 10MB)
        in: formData
        name: resume
        required: true
        type: file
      - description: Vacancy text (max 50KB)
        in: formData
        name: vacancy
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Result'
      summary: Tailor resume to vacancy
      tags:
      - tailor
  /api/tools/extract-ocr:
    post:
      consumes:
      - multipart/form-data
      description: Converts PDF to images and runs Tesseract OCR.
      parameters:
      - description: Resume PDF file
        in: formData
        name: resume
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.TextResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_transport_http.ErrorResponse'
      summary: Extract text from PDF (OCR)
      tags:
      - tools
  /api/tools/extract-text:
    post:
      consumes:
      - multipart/form-data
      description: Attempts to extract text layer from PDF without OCR.
      parameters:
      - description: Resume PDF file
        in: formData
        name: resume
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.TextResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_transport_http.ErrorResponse'
      summary: Extract text from PDF (Plain)
      tags:
      - tools
  /api/users/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT
      parameters:
      - description: Login info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.authResponse'
      summary: Login user
      tags:
      - users
  /api/users/me:
    get:
      description: Get profile of the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Profile'
      security:
      - ApiKeyAuth: []
      summary: Get current profile
      tags:
      - users
  /api/users/register:
    post:
      consumes:
      - application/json
      description: Create a new user and profile
      parameters:
      - description: Registration info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_transport_http.authResponse'
      summary: Register a new user
      tags:
      - users
  /api/vacancies:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Vacancy'
            type: array
      security:
      - ApiKeyAuth: []
      summary: List vacancies
      tags:
      - vacancies
    post:
      consumes:
      - application/json
      parameters:
      - description: Vacancy data
        in: body
        name: vacancy
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.CreateVacancyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Vacancy'
      security:
      - ApiKeyAuth: []
      summary: Create a vacancy
      tags:
      - vacancies
  /api/vacancies/{id}:
    delete:
      parameters:
      - description: Vacancy ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
      security:
      - ApiKeyAuth: []
      summary: Delete a vacancy
      tags:
      - vacancies
    get:
      parameters:
      - description: Vacancy ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_transport_http.VacancyResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a vacancy
      tags:
      - vacancies
    patch:
      consumes:
      - application/json
      parameters:
      - description: Vacancy ID
        in: path
        name: id
        required: true
        type: string
      - description: New status
        in: body
        name: status
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.UpdateVacancyStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_puddingtonnn_getyouroffer_backend_internal_models.Vacancy'
      security:
      - ApiKeyAuth: []
      summary: Update a vacancy status
      tags:
      - vacancies
securityDefinitions:
  ApiKeyAuth:
    description: Type "Bearer <your-jwt-token>" to authenticate.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
